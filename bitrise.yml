format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  ci:
    before_run:
    - test
    - test_integration

  test:
    steps:
    - git::https://github.com/bitrise-steplib/steps-check.git:
        title: Lint
        inputs:
        - workflow: lint
        - skip_step_yml_validation: "yes"
    - go-list:
        inputs:
        - exclude: |-
            */mocks
    - go-test: { }

  test_integration:
    steps:
    - script:
        title: Integration tests
        deps:
          brew:
          - name: zstd
          apt_get:
          - name: zstd
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            go test -v -tags integration ./integration
